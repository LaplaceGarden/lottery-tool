<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽签背书工具</title>
    <!-- SheetJS for xlsx export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --fs-student: 2.8rem;
            --fs-question: 2rem;
            --fs-answer: 1.6rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #f9d423, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .btn-settings-trigger {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #ccc;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-settings-trigger:hover {
            background: rgba(255,255,255,0.15);
            border-color: #f9d423;
            color: #f9d423;
        }

        /* ===== Settings Modal Overlay ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay .25s ease;
        }

        .modal-overlay.open {
            display: flex;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #1e1b3a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 32px 36px;
            width: 92%;
            max-width: 580px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp .3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,75,75,0.2);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .modal-content h2 {
            font-size: 1.3rem;
            margin-bottom: 24px;
            color: #f9d423;
        }

        .settings-section {
            margin-bottom: 26px;
        }

        .settings-section h3 {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .row label {
            min-width: 100px;
            font-size: 0.95rem;
            color: #bbb;
        }

        .row input[type="number"] {
            width: 90px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border .2s;
        }

        .row input[type="number"]:focus {
            border-color: #f9d423;
        }

        .row input[type="range"] {
            flex: 1;
            min-width: 120px;
            accent-color: #f9d423;
        }

        .range-val {
            font-size: 0.85rem;
            color: #f9d423;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .file-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.06);
            color: #ddd;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all .2s;
        }

        .file-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: #f9d423;
            color: #f9d423;
        }

        .file-btn.loaded {
            border-color: #4caf50;
            color: #4caf50;
        }

        .file-btn input[type="file"] { display: none; }

        .file-status {
            font-size: 0.82rem;
            color: #888;
            margin-left: 6px;
        }

        /* ===== 主舞台 ===== */
        .stage {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        /* 抽签结果卡片 */
        .result-card {
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .result-card .placeholder {
            font-size: 1.2rem;
            color: #666;
        }

        .result-card .student-no {
            font-size: var(--fs-student);
            font-weight: 700;
            color: #f9d423;
            animation: popIn .4s ease;
            line-height: 1.3;
        }

        .result-card .question-text {
            font-size: var(--fs-question);
            line-height: 1.6;
            color: #e8e8e8;
            max-width: 820px;
            animation: popIn .4s ease;
            word-break: break-word;
        }

        .result-card .answer-text {
            font-size: var(--fs-answer);
            line-height: 1.7;
            color: #4caf50;
            max-width: 820px;
            animation: fadeIn .3s ease;
            background: rgba(76,175,80,0.08);
            border: 1px solid rgba(76,175,80,0.2);
            border-radius: 14px;
            padding: 20px 28px;
            width: 100%;
            min-height: 100px;
            text-align: left;
            word-break: break-word;
        }

        /* 判定结果标签 */
        .judge-result {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 10px;
            animation: fadeIn .3s ease;
        }

        .judge-result.correct {
            color: #4caf50;
            background: rgba(76,175,80,0.12);
            border: 1px solid rgba(76,175,80,0.3);
        }

        .judge-result.wrong {
            color: #ff6b6b;
            background: rgba(255,75,75,0.12);
            border: 1px solid rgba(255,75,75,0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 16px 42px;
            border: none;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            letter-spacing: 1px;
        }

        .btn-draw {
            background: linear-gradient(135deg, #f9d423, #ff4e50);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(249,212,35,0.3);
        }

        .btn-draw:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(249,212,35,0.45);
        }

        .btn-draw:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-answer {
            background: rgba(76,175,80,0.15);
            color: #4caf50;
            border: 1px solid rgba(76,175,80,0.3);
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-answer.active {
            opacity: 1;
            cursor: pointer;
        }

        .btn-answer.active:hover {
            background: rgba(76,175,80,0.25);
            transform: translateY(-2px);
        }

        /* 判定按钮 */
        .btn-judge {
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: not-allowed;
            transition: all .25s;
            opacity: 0.3;
        }

        .btn-correct {
            background: rgba(76,175,80,0.15);
            color: #4caf50;
            border: 1px solid rgba(76,175,80,0.3);
        }

        .btn-wrong {
            background: rgba(255,75,75,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,75,75,0.3);
        }

        .btn-judge.active {
            opacity: 1;
            cursor: pointer;
        }

        .btn-correct.active:hover {
            background: rgba(76,175,80,0.3);
            transform: translateY(-2px);
        }

        .btn-wrong.active:hover {
            background: rgba(255,75,75,0.3);
            transform: translateY(-2px);
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 18px 28px;
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-item {
            font-size: 0.95rem;
            color: #999;
        }

        .status-item span {
            color: #f9d423;
            font-weight: 600;
        }

        .status-actions {
            display: flex;
            gap: 10px;
        }

        .btn-reset {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,75,75,0.4);
            background: rgba(255,75,75,0.1);
            color: #ff6b6b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-reset:hover { background: rgba(255,75,75,0.2); }

        .btn-export {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid rgba(76,175,80,0.4);
            background: rgba(76,175,80,0.1);
            color: #4caf50;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-export:hover { background: rgba(76,175,80,0.2); }
        .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ===== 历史记录 ===== */
        .history-panel {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 22px 28px;
            width: 100%;
            max-width: 900px;
            margin-top: 28px;
        }

        .history-panel h3 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
        }

        .history-list {
            max-height: 360px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.92rem;
        }

        .history-item:last-child { border-bottom: none; }

        .history-item .round-no {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(249,212,35,0.15);
            color: #f9d423;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .history-item .info {
            color: #bbb;
            line-height: 1.5;
            flex: 1;
        }

        .history-item .info strong { color: #f9d423; }

        .history-item .judge-tag {
            flex-shrink: 0;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .judge-tag.correct { color: #4caf50; background: rgba(76,175,80,0.12); }
        .judge-tag.wrong { color: #ff6b6b; background: rgba(255,75,75,0.12); }
        .judge-tag.pending { color: #888; background: rgba(255,255,255,0.06); }

        /* toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(255,75,75,0.92);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            z-index: 9999;
            transition: transform .35s ease;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: rgba(76,175,80,0.92); }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
    <h1>🎲 抽签背书</h1>
    <button class="btn-settings-trigger" id="openSettings" title="设置">⚙</button>
</div>

<!-- ===== Settings Modal ===== -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
        <button class="modal-close" id="closeSettings">✕</button>
        <h2>⚙️ 设置</h2>

        <!-- 抽签设置 -->
        <div class="settings-section">
            <h3>🎯 抽签设置</h3>
            <div class="row">
                <label>学号范围</label>
                <input type="number" id="stuStart" value="1" min="1">
                <span style="color:#888">—</span>
                <input type="number" id="stuEnd" value="50" min="1">
            </div>
        </div>

        <!-- 文件导入 -->
        <div class="settings-section">
            <h3>📁 文件导入</h3>
            <div class="row">
                <label>问题文件</label>
                <label class="file-btn" id="qFileBtn">
                    📄 选择 TXT
                    <input type="file" id="qFile" accept=".txt">
                </label>
                <span class="file-status" id="qStatus">未导入</span>
            </div>
            <div class="row">
                <label>答案文件</label>
                <label class="file-btn" id="aFileBtn">
                    📄 选择 TXT
                    <input type="file" id="aFile" accept=".txt">
                </label>
                <span class="file-status" id="aStatus">未导入</span>
            </div>
        </div>

        <!-- 字号设置 -->
        <div class="settings-section">
            <h3>🔤 字号设置（投屏优化）</h3>
            <div class="row">
                <label>学号字号</label>
                <input type="range" id="fsStudent" min="1.5" max="5" step="0.1" value="2.8">
                <span class="range-val" id="fsStudentVal">2.8rem</span>
            </div>
            <div class="row">
                <label>问题字号</label>
                <input type="range" id="fsQuestion" min="1" max="4" step="0.1" value="2">
                <span class="range-val" id="fsQuestionVal">2.0rem</span>
            </div>
            <div class="row">
                <label>答案字号</label>
                <input type="range" id="fsAnswer" min="1" max="3.5" step="0.1" value="1.6">
                <span class="range-val" id="fsAnswerVal">1.6rem</span>
            </div>
        </div>
    </div>
</div>

<!-- 主舞台 -->
<div class="stage">
    <div class="result-card" id="resultCard">
        <div class="placeholder">点击右上角 ⚙ 导入文件，然后点击「抽签」开始</div>
    </div>
    <div class="btn-group">
        <button class="btn btn-draw" id="drawBtn" disabled>🎯 抽签</button>
        <button class="btn-judge btn-correct" id="correctBtn">✅</button>
        <button class="btn-judge btn-wrong" id="wrongBtn">❌</button>
        <button class="btn btn-answer" id="answerBtn">📖 Answer</button>
    </div>
</div>

<!-- 状态栏 -->
<div class="status-bar">
    <div class="status-item">剩余问题: <span id="remainQ">0</span></div>
    <div class="status-item">剩余学号: <span id="remainS">0</span></div>
    <div class="status-item">已抽: <span id="doneCount">0</span> 轮</div>
    <div class="status-actions">
        <button class="btn-export" id="exportBtn" disabled>📥 导出 XLSX</button>
        <button class="btn-reset" id="resetBtn">🔄 重置</button>
    </div>
</div>

<!-- 历史 -->
<div class="history-panel">
    <h3>📋 抽签记录</h3>
    <div class="history-list" id="historyList">
        <div style="color:#666;font-size:0.88rem;">暂无记录</div>
    </div>
</div>

<script>
    // ===== State =====
    let questions = {};
    let answers = {};
    let availableQIds = [];
    let availableStudents = [];
    let currentQ = null;
    let currentStu = null;
    let round = 0;
    let judged = false;
    let historyRecords = [];

    // DOM
    const stuStartEl = document.getElementById('stuStart');
    const stuEndEl = document.getElementById('stuEnd');
    const qFileEl = document.getElementById('qFile');
    const aFileEl = document.getElementById('aFile');
    const qStatusEl = document.getElementById('qStatus');
    const aStatusEl = document.getElementById('aStatus');
    const qFileBtnEl = document.getElementById('qFileBtn');
    const aFileBtnEl = document.getElementById('aFileBtn');
    const drawBtn = document.getElementById('drawBtn');
    const answerBtn = document.getElementById('answerBtn');
    const correctBtn = document.getElementById('correctBtn');
    const wrongBtn = document.getElementById('wrongBtn');
    const resultCard = document.getElementById('resultCard');
    const remainQEl = document.getElementById('remainQ');
    const remainSEl = document.getElementById('remainS');
    const doneCountEl = document.getElementById('doneCount');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const historyList = document.getElementById('historyList');
    const toastEl = document.getElementById('toast');

    // Settings modal
    const settingsModal = document.getElementById('settingsModal');
    const openSettingsBtn = document.getElementById('openSettings');
    const closeSettingsBtn = document.getElementById('closeSettings');

    // Font-size sliders
    const fsStudentSlider = document.getElementById('fsStudent');
    const fsQuestionSlider = document.getElementById('fsQuestion');
    const fsAnswerSlider = document.getElementById('fsAnswer');
    const fsStudentValEl = document.getElementById('fsStudentVal');
    const fsQuestionValEl = document.getElementById('fsQuestionVal');
    const fsAnswerValEl = document.getElementById('fsAnswerVal');

    // ===== Settings Modal =====
    openSettingsBtn.addEventListener('click', () => {
        settingsModal.classList.add('open');
    });

    closeSettingsBtn.addEventListener('click', () => {
        settingsModal.classList.remove('open');
    });

    settingsModal.addEventListener('click', (e) => {
        if (e.target === settingsModal) settingsModal.classList.remove('open');
    });

    // Keyboard close
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') settingsModal.classList.remove('open');
    });

    // ===== Font-size sliders =====
    function applyFontSizes() {
        const root = document.documentElement;
        root.style.setProperty('--fs-student', fsStudentSlider.value + 'rem');
        root.style.setProperty('--fs-question', fsQuestionSlider.value + 'rem');
        root.style.setProperty('--fs-answer', fsAnswerSlider.value + 'rem');
        fsStudentValEl.textContent = parseFloat(fsStudentSlider.value).toFixed(1) + 'rem';
        fsQuestionValEl.textContent = parseFloat(fsQuestionSlider.value).toFixed(1) + 'rem';
        fsAnswerValEl.textContent = parseFloat(fsAnswerSlider.value).toFixed(1) + 'rem';
    }

    fsStudentSlider.addEventListener('input', applyFontSizes);
    fsQuestionSlider.addEventListener('input', applyFontSizes);
    fsAnswerSlider.addEventListener('input', applyFontSizes);

    // ===== Utils =====
    function showToast(msg, type) {
        toastEl.textContent = msg;
        toastEl.className = 'toast show' + (type === 'success' ? ' success' : '');
        setTimeout(() => toastEl.className = 'toast', 2500);
    }

    function parseFile(text) {
        const result = {};
        const lines = text.split('\n');
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            const m = line.match(/^(\d+)\.\s*(.*)/);
            if (m) {
                const id = parseInt(m[1]);
                const content = m[2].trim();
                if (content) result[id] = content;
            }
        }
        return result;
    }

    function randomPick(arr) {
        const idx = Math.floor(Math.random() * arr.length);
        return arr.splice(idx, 1)[0];
    }

    function updateStatus() {
        remainQEl.textContent = availableQIds.length;
        remainSEl.textContent = availableStudents.length;
        doneCountEl.textContent = round;
    }

    function checkReady() {
        const qReady = Object.keys(questions).length > 0;
        const aReady = Object.keys(answers).length > 0;
        const canDraw = qReady && aReady && availableQIds.length > 0 && availableStudents.length > 0;
        drawBtn.disabled = !canDraw;
    }

    function setJudgeBtnsActive(active) {
        correctBtn.classList.toggle('active', active);
        wrongBtn.classList.toggle('active', active);
    }

    function initPools() {
        availableQIds = Object.keys(questions).map(Number);
        const start = parseInt(stuStartEl.value) || 1;
        const end = parseInt(stuEndEl.value) || 50;
        availableStudents = [];
        for (let i = Math.min(start, end); i <= Math.max(start, end); i++) {
            availableStudents.push(i);
        }
        round = 0;
        currentQ = null;
        currentStu = null;
        judged = false;
        historyRecords = [];
        resultCard.innerHTML = '<div class="placeholder">点击右上角 ⚙ 导入文件，然后点击「抽签」开始</div>';
        answerBtn.classList.remove('active');
        setJudgeBtnsActive(false);
        historyList.innerHTML = '<div style="color:#666;font-size:0.88rem;">暂无记录</div>';
        exportBtn.disabled = true;
        updateStatus();
    }

    function updateHistoryItemJudge(roundNo, result) {
        const items = historyList.querySelectorAll('.history-item');
        for (const item of items) {
            const tag = item.querySelector('.judge-tag');
            if (tag && tag.dataset.round == roundNo) {
                tag.className = 'judge-tag ' + (result === '正确' ? 'correct' : 'wrong');
                tag.textContent = result === '正确' ? '✅ 正确' : '❌ 错误';
                break;
            }
        }
    }

    // ===== File Import =====
    qFileEl.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            questions = parseFile(ev.target.result);
            const cnt = Object.keys(questions).length;
            if (cnt === 0) {
                showToast('问题文件解析失败，请检查格式');
                return;
            }
            qStatusEl.textContent = `已导入 ${cnt} 题`;
            qStatusEl.style.color = '#4caf50';
            qFileBtnEl.classList.add('loaded');
            initPools();
            checkReady();
        };
        reader.readAsText(file);
    });

    aFileEl.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            answers = parseFile(ev.target.result);
            const cnt = Object.keys(answers).length;
            if (cnt === 0) {
                showToast('答案文件解析失败，请检查格式');
                return;
            }
            aStatusEl.textContent = `已导入 ${cnt} 条`;
            aStatusEl.style.color = '#4caf50';
            aFileBtnEl.classList.add('loaded');
            checkReady();
        };
        reader.readAsText(file);
    });

    // Student range change
    stuStartEl.addEventListener('change', () => {
        if (Object.keys(questions).length > 0) initPools();
        checkReady();
    });
    stuEndEl.addEventListener('change', () => {
        if (Object.keys(questions).length > 0) initPools();
        checkReady();
    });

    // ===== Draw =====
    drawBtn.addEventListener('click', () => {
        if (availableQIds.length === 0) {
            showToast('所有问题已抽完！');
            return;
        }
        if (availableStudents.length === 0) {
            showToast('所有学号已抽完！');
            return;
        }

        // 如果上一轮未判定，标记为「未判定」
        // (已自动在 historyRecords 中默认)

        currentQ = randomPick(availableQIds);
        currentStu = randomPick(availableStudents);
        round++;
        judged = false;

        resultCard.innerHTML = `
            <div class="student-no">🙋 学号 ${currentStu}</div>
            <div class="question-text">❓ 第${currentQ}题：${questions[currentQ]}</div>
        `;

        answerBtn.classList.add('active');
        setJudgeBtnsActive(true);

        const record = {
            round: round,
            studentNo: currentStu,
            qId: currentQ,
            question: questions[currentQ],
            result: '未判定',
            answer: answers[currentQ] || '无'
        };
        historyRecords.push(record);

        if (round === 1) historyList.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="round-no">${round}</div>
            <div class="info">
                学号 <strong>${currentStu}</strong> → 第 ${currentQ} 题：${questions[currentQ]}
            </div>
            <span class="judge-tag pending" data-round="${round}">⏳ 待判定</span>
        `;
        historyList.prepend(item);

        exportBtn.disabled = false;
        updateStatus();
        checkReady();
    });

    // ===== Judge: Correct =====
    correctBtn.addEventListener('click', () => {
        if (!correctBtn.classList.contains('active')) return;
        if (judged) return;
        judged = true;

        const rec = historyRecords[historyRecords.length - 1];
        rec.result = '正确';

        const tag = document.createElement('div');
        tag.className = 'judge-result correct';
        tag.textContent = '✅ 回答正确';
        resultCard.appendChild(tag);

        updateHistoryItemJudge(round, '正确');
        setJudgeBtnsActive(false);
    });

    // ===== Judge: Wrong =====
    wrongBtn.addEventListener('click', () => {
        if (!wrongBtn.classList.contains('active')) return;
        if (judged) return;
        judged = true;

        const rec = historyRecords[historyRecords.length - 1];
        rec.result = '错误';

        const tag = document.createElement('div');
        tag.className = 'judge-result wrong';
        tag.textContent = '❌ 回答错误';
        resultCard.appendChild(tag);

        updateHistoryItemJudge(round, '错误');
        setJudgeBtnsActive(false);
    });

    // ===== Show Answer =====
    answerBtn.addEventListener('click', () => {
        if (!answerBtn.classList.contains('active')) return;
        if (currentQ === null) return;

        const ans = answers[currentQ];
        if (!ans) {
            showToast('该题暂无对应答案');
            return;
        }

        if (resultCard.querySelector('.answer-text')) return;

        const div = document.createElement('div');
        div.className = 'answer-text';
        div.innerHTML = `📖 ${ans}`;
        resultCard.appendChild(div);

        answerBtn.classList.remove('active');
    });

    // ===== Export =====
    exportBtn.addEventListener('click', () => {
        if (historyRecords.length === 0) {
            showToast('暂无记录可导出');
            return;
        }

        const data = historyRecords.map(r => ({
            '学号': r.studentNo,
            '问题序号': r.qId,
            '问题描述': r.question,
            '回答结果': r.result,
            '答案': r.answer
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        ws['!cols'] = [
            { wch: 8 },
            { wch: 10 },
            { wch: 40 },
            { wch: 12 },
            { wch: 30 }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '抽签记录');
        XLSX.writeFile(wb, '抽签背书记录.xlsx');
        showToast('导出成功！', 'success');
    });

    // ===== Reset =====
    resetBtn.addEventListener('click', () => {
        initPools();
        checkReady();
        updateStatus();
    });

    // Init
    updateStatus();
    applyFontSizes();
</script>
</body>
</html>
